#schema: https://raw.githubusercontent.com/srikanthccv/otelcol-jsonschema/refs/heads/main/schema.json
extensions:
  headers_setter/clients:
    headers:
      - action: upsert
        key: uptrace-dsn
        from_context: uptrace-dsn
  health_check:
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${OTLP_COLLECTOR_GRPC}
        include_metadata: true
      http:
        endpoint: 0.0.0.0:${OTLP_COLLECTOR_HTTP}
        include_metadata: true
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
      disk:
      load:
      filesystem:
      memory:
      network:
      paging:
  prometheus/self:
    config:
      scrape_configs:
        # Self telemetry
        - job_name: 'otelcol'
          scrape_interval: 10s
          static_configs:
            - targets: [ '0.0.0.0:8888' ]
        # If docker metrics enabled
        - job_name: 'docker'
          static_configs:
            - targets: [ 'host.docker.internal:9323' ]
  httpcheck/self:
    targets:
      - endpoint: 'http://localhost:13133/health/status'
        method: GET
  postgresql/uptrace:
    endpoint: postgresql:5432
    transport: tcp
    username: ${POSTGRESQL_USER}
    password: ${POSTGRESQL_PASSWORD}
    databases:
      - ${POSTGRESQL_DATABASE}
    tls:
      insecure: true
  redis/uptrace:
    endpoint: redis:6379
    collection_interval: 10s
    password: ${REDIS_PASSWORD}

processors:
  resourcedetection:
    detectors: [ 'system' ]
  batch/system:
    send_batch_size: 10000
    timeout: 10s
  batch/clients:
    send_batch_size: 10000
    timeout: 10s
    metadata_keys:
      - uptrace-dsn

exporters:
  otlp/clients:
    endpoint: uptrace:${UPTRACE_GRPC}
    tls:
      insecure: true
    auth:
      authenticator: headers_setter/clients
  otlp/system:
    endpoint: uptrace:${UPTRACE_GRPC}
    tls:
      insecure: true
    headers:
      uptrace-dsn: http://${UPTRACE_SYSTEM_PROJECT_TOKEN}@uptrace:${UPTRACE_HTTP}?grpc=${UPTRACE_GRPC}

  prometheusremotewrite/system:
    endpoint: http://uptrace:${UPTRACE_HTTP}/api/v1/prometheus/write
    tls:
      insecure: true
    headers:
      uptrace-dsn: http://${UPTRACE_SYSTEM_PROJECT_TOKEN}@uptrace:${UPTRACE_HTTP}?grpc=${UPTRACE_GRPC}


service:
  telemetry:
    metrics:
      address: ':8888'
    logs:
      level: DEBUG
  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ batch/clients ]
      exporters: [ otlp/clients ]
    logs:
      receivers: [ otlp ]
      processors: [ batch/clients ]
      exporters: [ otlp/clients ]
    metrics/clients:
      receivers: [ otlp ]
      processors: [ batch/clients ]
      exporters: [ otlp/clients ]
    metrics/system-otlp:
      receivers: [ hostmetrics, postgresql/uptrace, httpcheck/self, redis/uptrace ]
      processors: [ batch/system, resourcedetection ]
      exporters: [ otlp/system ]
    metrics/system-prometheus:
      receivers: [prometheus/self]
      processors: [batch/system]
      exporters: [prometheusremotewrite/system]

  extensions: [ health_check, pprof, zpages, headers_setter/clients ]
